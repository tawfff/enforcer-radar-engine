name: scan
on:
  schedule:
    - cron: "17 * * * *"   # hourly
  workflow_dispatch: {}
  push:
    branches: [ main ]      # run on first push to populate leads.json
permissions:
  contents: write
concurrency:
  group: scan
  cancel-in-progress: false
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.RADAR_GH_PAT }}
        run: node scan.mjs
      - name: Commit updated leads
        run: |
          git config user.name "enforcer-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add leads.json
          git diff --cached --quiet || git commit -m "scan: refresh leads"
          git push
